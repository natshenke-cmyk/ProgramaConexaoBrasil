<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1b3e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Conexão Brasil" />
  <title>Conexão Brasil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:#0d1b3e; --navy-mid:#162250; --teal:#00d4aa; --green:#2ecc71;
      --grad-a:linear-gradient(135deg,#00d4aa 0%,#2ecc71 100%);
      --white:#ffffff; --muted:rgba(255,255,255,0.45); --border:rgba(255,255,255,0.08);
      --card-bg:rgba(255,255,255,0.04); --card-hover:rgba(255,255,255,0.07);
      --danger:#ff4d6d; --danger-soft:rgba(255,77,109,0.12);
      --success-bg:rgba(0,212,170,0.10); --radius-sm:10px; --radius-md:16px; --radius-xl:32px;
      --shadow-btn:0 8px 24px rgba(0,212,170,0.35);
      --font-main:'Plus Jakarta Sans',sans-serif; --font-body:'DM Sans',sans-serif;
      --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%}
    body{font-family:var(--font-body);background:var(--navy);color:var(--white);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    @media(min-width:520px){body{background:#080e1e}}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
    .orb-1{width:320px;height:320px;background:radial-gradient(circle,rgba(0,212,170,0.14) 0%,transparent 70%);top:-100px;right:-80px}
    .orb-2{width:260px;height:260px;background:radial-gradient(circle,rgba(46,204,113,0.09) 0%,transparent 70%);bottom:120px;left:-70px}
    #app{display:flex;flex-direction:column;min-height:100dvh;max-width:480px;margin:0 auto;position:relative}
    @media(min-width:520px){#app{box-shadow:0 0 80px rgba(0,0,0,0.5)}}
    .header{padding:calc(var(--safe-top) + 14px) 20px 14px;background:linear-gradient(180deg,rgba(13,27,62,0.98) 0%,rgba(13,27,62,0.92) 100%);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
    .header-inner{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .header-logo{height:44px;width:auto;display:block;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,212,170,0.18))}
    .header-right{display:flex;align-items:center;gap:8px}
    .header-badge{background:var(--success-bg);border:1px solid rgba(0,212,170,0.25);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;color:var(--teal);letter-spacing:0.5px;font-family:var(--font-main);white-space:nowrap}
    .sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
    .sync-ok .sync-dot{background:var(--teal);animation:pulse-dot 2s infinite}
    .sync-err .sync-dot{background:#ff4d6d}
    .sync-loading .sync-dot{background:var(--muted)}
    .sync-label{font-size:10px;font-family:var(--font-main);font-weight:600;color:var(--muted)}
    .sync-ok .sync-label{color:var(--teal)}
    .sync-err .sync-label{color:#ff4d6d}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}
    .tabs{display:flex;gap:6px;padding:14px 20px 0;background:var(--navy);position:sticky;top:calc(var(--safe-top) + 66px);z-index:90}
    .tab-btn{flex:1;padding:10px 8px;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:transparent;color:var(--muted);font-family:var(--font-main);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s ease;display:flex;align-items:center;justify-content:center;gap:6px}
    .tab-btn.active{background:var(--card-bg);color:var(--white);border-color:rgba(0,212,170,0.3);border-bottom:2px solid var(--teal)}
    .tab-btn:not(.active):hover{color:rgba(255,255,255,0.7);background:var(--card-bg)}
    .tab-count{background:var(--teal);color:var(--navy);border-radius:20px;padding:1px 7px;font-size:10px;font-weight:800}
    .content{flex:1;padding:20px 20px calc(var(--safe-bot) + 28px);position:relative;z-index:1;border-top:1px solid rgba(0,212,170,0.15)}
    .tab-panel{display:none;animation:fadeIn 0.25s ease}
    .tab-panel.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .user-banner{display:flex;align-items:center;justify-content:space-between;background:var(--success-bg);border:1px solid rgba(0,212,170,0.2);border-radius:var(--radius-md);padding:12px 16px;margin-bottom:20px}
    .user-banner-left{display:flex;align-items:center;gap:10px}
    .user-avatar{width:32px;height:32px;background:var(--grad-a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-main);font-size:13px;font-weight:800;color:var(--navy);flex-shrink:0}
    .user-info{display:flex;flex-direction:column}
    .user-role{font-size:10px;color:var(--muted);font-weight:500}
    .user-name{font-size:14px;font-weight:700;font-family:var(--font-main)}
    .btn-change{background:transparent;border:1px solid rgba(0,212,170,0.3);color:var(--teal);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.18s;font-family:var(--font-main)}
    .btn-change:hover{background:var(--success-bg)}
    .date-group{margin-bottom:24px}
    .date-label{font-family:var(--font-main);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .date-label.today{color:var(--teal)}
    .date-label.today::after{content:'HOJE';background:var(--teal);color:var(--navy);font-size:9px;padding:2px 7px;border-radius:10px;font-weight:800}
    .schedule-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:14px;transition:all 0.18s ease;position:relative;overflow:hidden}
    .schedule-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad-a);border-radius:0 2px 2px 0}
    .schedule-card.today-card{border-color:rgba(0,212,170,0.2);background:rgba(0,212,170,0.05)}
    .schedule-card:hover{background:var(--card-hover);transform:translateY(-1px)}
    .card-time{display:flex;flex-direction:column;align-items:center;min-width:46px;flex-shrink:0;padding-top:2px}
    .time-hour{font-family:var(--font-main);font-size:18px;font-weight:800;color:var(--teal);line-height:1}
    .time-min{font-family:var(--font-main);font-size:11px;font-weight:600;color:var(--muted)}
    .card-divider{width:1px;min-height:36px;background:var(--border);flex-shrink:0;align-self:stretch}
    .card-info{flex:1;min-width:0}
    .card-company{font-family:var(--font-main);font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-seller{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}
    .card-obs{font-size:11px;color:var(--muted);font-weight:400;margin-top:5px;line-height:1.4;white-space:normal}
    .btn-delete{width:30px;height:30px;border-radius:50%;border:1px solid var(--danger-soft);background:var(--danger-soft);color:var(--danger);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0}
    .btn-delete:hover{background:rgba(255,77,109,0.22);transform:scale(1.1)}
    .empty-state{text-align:center;padding:48px 24px}
    .empty-icon{width:64px;height:64px;background:var(--card-bg);border:1px solid var(--border);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
    .empty-title{font-family:var(--font-main);font-size:16px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:6px}
    .empty-sub{font-size:13px;color:var(--muted);line-height:1.5}
    .form-group{margin-bottom:18px}
    .form-label{display:block;font-family:var(--font-main);font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .form-label span{font-weight:400;text-transform:none;letter-spacing:0;font-size:10px}
    .form-control{width:100%;padding:13px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--white);font-family:var(--font-body);font-size:15px;font-weight:500;appearance:none;-webkit-appearance:none;transition:border-color 0.18s,box-shadow 0.18s;outline:none}
    .form-control:focus{border-color:rgba(0,212,170,0.5);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .form-control::placeholder{color:rgba(255,255,255,0.22)}
    .form-control::-webkit-calendar-picker-indicator{filter:invert(1) brightness(0.6)}
    textarea.form-control{resize:vertical;min-height:80px;line-height:1.5}
    .form-divider{height:1px;background:var(--border);margin:20px 0}
    .vendor-chips{display:flex;gap:8px;flex-wrap:wrap}
    .v-chip{padding:8px 16px;border-radius:30px;border:1px solid var(--border);background:var(--card-bg);color:var(--muted);font-family:var(--font-main);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.18s ease}
    .v-chip:hover{border-color:rgba(0,212,170,0.4);color:rgba(255,255,255,0.8)}
    .v-chip.selected{background:var(--grad-a);border-color:transparent;color:var(--navy);box-shadow:0 4px 14px rgba(0,212,170,0.35)}
    .time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .time-slot{padding:10px 4px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:rgba(255,255,255,0.7);font-family:var(--font-main);font-size:12px;font-weight:600;text-align:center;cursor:pointer;transition:all 0.18s}
    .time-slot:hover:not(.busy):not(.selected){border-color:rgba(0,212,170,0.4);color:var(--white)}
    .time-slot.selected{background:var(--grad-a);border-color:transparent;color:var(--navy);box-shadow:0 4px 14px rgba(0,212,170,0.35)}
    .time-slot.busy{opacity:0.3;cursor:not-allowed;text-decoration:line-through}
    .btn-submit{width:100%;padding:16px;background:var(--grad-a);border:none;border-radius:var(--radius-md);color:var(--navy);font-family:var(--font-main);font-size:15px;font-weight:800;letter-spacing:0.3px;cursor:pointer;transition:all 0.2s ease;box-shadow:var(--shadow-btn);margin-top:8px}
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,212,170,0.45)}
    .btn-submit:active{transform:translateY(0)}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}
    .toast-wrap{position:fixed;top:calc(var(--safe-top)+16px);left:50%;transform:translateX(-50%);z-index:9999;width:calc(100% - 48px);max-width:420px;pointer-events:none}
    .toast{padding:14px 18px;border-radius:var(--radius-md);font-family:var(--font-main);font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s forwards}
    .toast.ok{background:rgba(0,212,170,0.95);color:var(--navy)}
    .toast.err{background:rgba(255,77,109,0.95);color:var(--white)}
    @keyframes toastIn{from{opacity:0;transform:translateY(-20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-20px) scale(0.95)}}
    .modal-overlay{position:fixed;inset:0;background:rgba(13,27,62,0.88);backdrop-filter:blur(12px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;padding-bottom:var(--safe-bot)}
    .modal-overlay.hidden{display:none}
    .modal-sheet{background:var(--navy-mid);border:1px solid var(--border);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:28px 24px 36px;width:100%;max-width:480px;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1)}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
    .modal-title{font-family:var(--font-main);font-size:20px;font-weight:800;margin-bottom:6px}
    .modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5}
    .modal-options{display:flex;flex-direction:column;gap:10px}
    .modal-option{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--card-bg);cursor:pointer;transition:all 0.18s}
    .modal-option:hover{border-color:rgba(0,212,170,0.4);background:var(--card-hover)}
    .mo-avatar{width:38px;height:38px;border-radius:50%;background:var(--grad-a);display:flex;align-items:center;justify-content:center;font-family:var(--font-main);font-size:15px;font-weight:800;color:var(--navy);flex-shrink:0}
    .mo-name{font-family:var(--font-main);font-size:16px;font-weight:700}
    .mo-role{font-size:12px;color:var(--muted)}
    .week-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;margin-bottom:20px;gap:8px}
    .week-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--white);font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0}
    .week-btn:hover{border-color:rgba(0,212,170,0.4);background:var(--success-bg);color:var(--teal)}
    .week-label-wrap{flex:1;text-align:center}
    .week-label{font-family:var(--font-main);font-size:13px;font-weight:700;color:var(--white)}
    .week-label.current{color:var(--teal)}
    .week-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .loading-state{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px 24px}
    .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-txt{font-size:13px;color:var(--muted);font-family:var(--font-main)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="toast-wrap" id="toastWrap"></div>

<div class="modal-overlay hidden" id="userModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Olá! Quem é você? 👋</div>
    <div class="modal-sub">Selecione seu nome para criar e gerenciar agendamentos.</div>
    <div class="modal-options" id="modalOptions"></div>
  </div>
</div>

<div id="app">
  <header class="header">
    <div class="header-inner">
      <img class="header-logo" id="logoImg" alt="Conexão Brasil" />
      <div class="header-right">
        <span id="syncStatus" class="sync-loading">
          <span class="sync-dot"></span>
          <span class="sync-label" id="syncLabel">Conectando...</span>
        </span>
        <div class="header-badge">Gravações</div>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" id="tab-lista" onclick="switchTab('lista')">
      📋 Agendamentos <span class="tab-count" id="tabCount">0</span>
    </button>
    <button class="tab-btn" id="tab-novo" onclick="switchTab('novo')">
      ➕ Novo
    </button>
  </nav>

  <main class="content">
    <div class="tab-panel active" id="panel-lista">
      <div class="user-banner">
        <div class="user-banner-left">
          <div class="user-avatar" id="avatarLista">?</div>
          <div class="user-info">
            <span class="user-role">Logado como</span>
            <span class="user-name" id="nameLista">—</span>
          </div>
        </div>
        <button class="btn-change" onclick="trocar()">Trocar</button>
      </div>
      <div class="week-nav">
        <button class="week-btn" onclick="changeWeek(-1)">&#8249;</button>
        <div class="week-label-wrap">
          <div class="week-label" id="weekLabel">—</div>
          <div class="week-sub" id="weekSub">—</div>
        </div>
        <button class="week-btn" onclick="changeWeek(1)">&#8250;</button>
      </div>
      <div id="scheduleList">
        <div class="loading-state"><div class="spinner"></div><span class="loading-txt">Carregando agendamentos...</span></div>
      </div>
    </div>

    <div class="tab-panel" id="panel-novo">
      <div class="user-banner">
        <div class="user-banner-left">
          <div class="user-avatar" id="avatarNovo">?</div>
          <div class="user-info">
            <span class="user-role">Agendando como</span>
            <span class="user-name" id="nameNovo">—</span>
          </div>
        </div>
        <button class="btn-change" onclick="trocar()">Trocar</button>
      </div>
      <div class="form-group">
        <label class="form-label">👤 Vendedor</label>
        <div class="vendor-chips" id="vendorChips"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="fEmpresa">🏢 Nome da Empresa</label>
        <input type="text" class="form-control" id="fEmpresa" placeholder="Ex: Empresa XYZ Ltda" maxlength="80" />
      </div>
      <div class="form-group">
        <label class="form-label" for="fData">📅 Data da Gravação</label>
        <input type="date" class="form-control" id="fData" />
      </div>
      <div class="form-divider"></div>
      <div class="form-group">
        <label class="form-label">🕐 Horário da Gravação</label>
        <div class="time-grid" id="timeGrid"></div>
        <input type="hidden" id="fHorario" />
      </div>
      <div class="form-group">
        <label class="form-label" for="fObs">📝 Observações <span>(opcional)</span></label>
        <textarea class="form-control" id="fObs" placeholder="Ex: Trazer roteiro, cliente pediu horário específico..."></textarea>
      </div>
      <button class="btn-submit" id="btnSalvar" onclick="salvar()">✓ Confirmar Agendamento</button>
    </div>
  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";

// ── CONFIGURAÇÃO FIREBASE ──────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAUCWmEiIzjoMT97BMLNQjN7nciHisoxZQ",
  authDomain: "programaconexaobrasil-dfc3c.firebaseapp.com",
  projectId: "programaconexaobrasil-dfc3c",
  storageBucket: "programaconexaobrasil-dfc3c.firebasestorage.app",
  messagingSenderId: "360012028941",
  appId: "1:360012028941:web:3f46f66220ed4f769d4944"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── DADOS ──────────────────────────────────────────────────────────────────
const VENDEDORES = { 'Carlos':'v1', 'Natália':'v2', 'Gustavo':'v3', 'Willian':'v4' };
const NOMES = Object.keys(VENDEDORES);
const HORARIOS = [];
for (let h = 8; h <= 19; h++) HORARIOS.push(String(h).padStart(2,'0') + ':00');

const LS_USR = 'cb_usr_v3';
let ags = [];
let user = null;
let vendSel = null;

// ── USUÁRIO (localStorage) ─────────────────────────────────────────────────
function loadUser() {
  try {
    const r = localStorage.getItem(LS_USR);
    if (!r) return null;
    const u = JSON.parse(r);
    return (u && u.nome && u.id && VENDEDORES[u.nome] === u.id) ? u : null;
  } catch(e) { return null; }
}
function saveUser(u) { try { localStorage.setItem(LS_USR, JSON.stringify(u)); } catch(e) {} }

// ── UTILITÁRIOS ────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function getWeekBounds(offset) {
  const now = new Date();
  const dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - dow + (dow === 0 ? -6 : 1) + offset * 7);
  mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  function fmt(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
  return { start: fmt(mon), end: fmt(sun), monDate: mon, sunDate: sun };
}
function fmtDate(str) {
  const parts = str.split('-');
  const dt = new Date(+parts[0], +parts[1]-1, +parts[2]);
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return dias[dt.getDay()] + ', ' + (+parts[2]) + ' de ' + meses[+parts[1]-1];
}
function toast(msg, type) {
  type = type || 'ok';
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

function setSyncStatus(state, label) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-' + state;
  document.getElementById('syncLabel').textContent = label;
}

// ── FIREBASE: ESCUTAR AGENDAMENTOS EM TEMPO REAL ───────────────────────────
const agCol = collection(db, 'agendamentos');
const agQuery = query(agCol, orderBy('criadoEm', 'asc'));

onSnapshot(agQuery,
  (snapshot) => {
    ags = snapshot.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
    setSyncStatus('ok', 'Ao vivo');
    renderList();
    buildTimeGrid();
    console.log('[CB] ' + ags.length + ' agendamento(s) sincronizado(s).');
  },
  (error) => {
    console.error('[CB] Erro Firestore:', error);
    setSyncStatus('err', 'Erro');
    toast('Erro de conexão com o servidor.', 'err');
  }
);

// ── SALVAR AGENDAMENTO ─────────────────────────────────────────────────────
window.salvar = async function() {
  if (!user) { toast('Selecione seu usuário primeiro.','err'); openModal(); return; }
  if (!vendSel) { toast('Selecione o vendedor.','err'); return; }
  const empresa = document.getElementById('fEmpresa').value.trim();
  const data    = document.getElementById('fData').value;
  const horario = document.getElementById('fHorario').value;
  const obs     = document.getElementById('fObs').value.trim();
  if (!empresa) { toast('Informe o nome da empresa.','err'); return; }
  if (!data)    { toast('Selecione a data.','err'); return; }
  if (!horario) { toast('Selecione o horário.','err'); return; }
  // Verificar conflito localmente (já temos os dados em tempo real)
  const conflito = ags.find(a => a.data === data && a.horario === horario);
  if (conflito) { toast(horario + ' já está ocupado por "' + conflito.empresa + '".','err'); return; }

  const btn = document.getElementById('btnSalvar');
  btn.disabled = true;
  btn.textContent = 'Salvando...';
  try {
    await addDoc(agCol, {
      empresa, data, horario, obs,
      autorId:   VENDEDORES[vendSel],
      autorNome: vendSel,
      criadoEm:  serverTimestamp()
    });
    document.getElementById('fEmpresa').value = '';
    document.getElementById('fHorario').value = '';
    document.getElementById('fObs').value = '';
    buildTimeGrid();
    toast('✓ Agendado! ' + empresa + ' às ' + horario);
    setTimeout(() => switchTab('lista'), 600);
  } catch(e) {
    toast('Erro ao salvar. Tente novamente.','err');
    console.error(e);
  }
  btn.disabled = false;
  btn.textContent = '✓ Confirmar Agendamento';
};

// ── EXCLUIR AGENDAMENTO ────────────────────────────────────────────────────
window.excluir = async function(firestoreId, autorId, empresa, horario) {
  if (!user || user.id !== autorId) {
    toast('Apenas quem criou pode excluir este agendamento.', 'err'); return;
  }
  if (!confirm('Excluir "' + empresa + '" às ' + horario + '?')) return;
  try {
    await deleteDoc(doc(db, 'agendamentos', firestoreId));
    toast('Agendamento excluído.');
  } catch(e) {
    toast('Erro ao excluir.','err');
    console.error(e);
  }
};

// ── UI ─────────────────────────────────────────────────────────────────────
window.changeWeek = function(dir) { weekOffset += dir; renderList(); };

function updateWeekLabel() {
  const b = getWeekBounds(weekOffset);
  const lbl = document.getElementById('weekLabel');
  const sub = document.getElementById('weekSub');
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const monD = b.monDate, sunD = b.sunDate;
  let range = (+monD.getDate()) + ' ' + meses[monD.getMonth()];
  if (monD.getMonth() !== sunD.getMonth()) range += ' – ' + sunD.getDate() + ' ' + meses[sunD.getMonth()];
  else range += ' – ' + sunD.getDate();
  range += ' de ' + sunD.getFullYear();
  if (weekOffset === 0)       { lbl.textContent = '📅 Semana Atual'; lbl.className = 'week-label current'; }
  else if (weekOffset === -1) { lbl.textContent = '⬅ Semana Passada'; lbl.className = 'week-label'; }
  else if (weekOffset === 1)  { lbl.textContent = 'Próxima Semana ➡'; lbl.className = 'week-label'; }
  else if (weekOffset < 0)    { lbl.textContent = Math.abs(weekOffset) + ' semanas atrás'; lbl.className = 'week-label'; }
  else                        { lbl.textContent = 'Daqui ' + weekOffset + ' semanas'; lbl.className = 'week-label'; }
  sub.textContent = range;
}

function renderList() {
  const container = document.getElementById('scheduleList');
  const hj = today();
  const bounds = getWeekBounds(weekOffset);
  updateWeekLabel();
  const filtrados = ags.filter(a => a.data >= bounds.start && a.data <= bounds.end);
  filtrados.sort((a,b) => a.data !== b.data ? (a.data < b.data ? -1 : 1) : (a.horario < b.horario ? -1 : 1));
  document.getElementById('tabCount').textContent = filtrados.length;
  if (!filtrados.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Sem agendamentos</div><div class="empty-sub">Nenhum agendamento nesta semana.<br>Crie um novo na aba ao lado!</div></div>';
    return;
  }
  const grupos = {};
  filtrados.forEach(a => { if (!grupos[a.data]) grupos[a.data]=[]; grupos[a.data].push(a); });
  container.innerHTML = '';
  Object.keys(grupos).forEach(data => {
    const eHoje = data === hj;
    const grupo = document.createElement('div');
    grupo.className = 'date-group';
    const lbl = document.createElement('div');
    lbl.className = 'date-label' + (eHoje ? ' today' : '');
    lbl.textContent = fmtDate(data);
    grupo.appendChild(lbl);
    grupos[data].forEach(ag => {
      const card = document.createElement('div');
      card.className = 'schedule-card' + (eHoje ? ' today-card' : '');
      card.id = 'card-' + ag.firestoreId;
      const podeExcluir = user && user.id === ag.autorId;
      const btnDel = podeExcluir
        ? `<button class="btn-delete" onclick="excluir('${ag.firestoreId}','${ag.autorId}','${ag.empresa.replace(/'/g,"\\'")}','${ag.horario}')" title="Excluir">✕</button>`
        : '';
      const partes = ag.horario.split(':');
      const obsHtml = ag.obs ? '<div class="card-obs">📝 ' + esc(ag.obs) + '</div>' : '';
      card.innerHTML =
        '<div class="card-time"><span class="time-hour">' + partes[0] + '</span><span class="time-min">:' + partes[1] + '</span></div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-info"><div class="card-company">' + esc(ag.empresa) + '</div><div class="card-seller">👤 ' + esc(ag.autorNome) + '</div>' + obsHtml + '</div>' +
        btnDel;
      grupo.appendChild(card);
    });
    container.appendChild(grupo);
  });
}

function buildTimeGrid() {
  const grid = document.getElementById('timeGrid');
  const dataSel = document.getElementById('fData').value;
  const horSel = document.getElementById('fHorario').value;
  const ocupados = ags.filter(a => a.data === dataSel).map(a => a.horario);
  grid.innerHTML = '';
  HORARIOS.forEach(h => {
    const slot = document.createElement('div');
    const busy = ocupados.includes(h);
    const sel = h === horSel;
    slot.className = 'time-slot' + (busy ? ' busy' : '') + (sel ? ' selected' : '');
    slot.textContent = h;
    if (!busy) slot.onclick = () => { document.getElementById('fHorario').value = h; buildTimeGrid(); };
    grid.appendChild(slot);
  });
}

window.switchTab = function(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'novo') buildTimeGrid();
};

function openModal() {
  const opts = document.getElementById('modalOptions');
  opts.innerHTML = '';
  NOMES.forEach(nome => {
    const el = document.createElement('div');
    el.className = 'modal-option';
    el.innerHTML = '<div class="mo-avatar">' + nome[0] + '</div><div><div class="mo-name">' + esc(nome) + '</div><div class="mo-role">Vendedor(a)</div></div>';
    el.onclick = () => selectUser(nome);
    opts.appendChild(el);
  });
  document.getElementById('userModal').classList.remove('hidden');
}
window.openModal = openModal;

function selectUser(nome) {
  user = { nome, id: VENDEDORES[nome] };
  saveUser(user);
  document.getElementById('userModal').classList.add('hidden');
  vendSel = nome;
  renderBanners();
  renderChips();
  renderList();
  toast('Bem-vindo(a), ' + nome + '! 👋');
}

window.trocar = function() {
  if (!confirm('Deseja trocar de usuário?')) return;
  localStorage.removeItem(LS_USR);
  user = null; vendSel = null;
  renderBanners(); renderChips(); renderList(); openModal();
};

function renderBanners() {
  const nome = user ? user.nome : '—';
  const letra = user ? user.nome[0] : '?';
  document.getElementById('avatarLista').textContent = letra;
  document.getElementById('nameLista').textContent = nome;
  document.getElementById('avatarNovo').textContent = letra;
  document.getElementById('nameNovo').textContent = nome;
}

function renderChips() {
  const wrap = document.getElementById('vendorChips');
  wrap.innerHTML = '';
  NOMES.forEach(nome => {
    const el = document.createElement('div');
    el.className = 'v-chip' + (vendSel === nome ? ' selected' : '');
    el.textContent = nome;
    el.onclick = () => { vendSel = nome; renderChips(); buildTimeGrid(); };
    wrap.appendChild(el);
  });
}

// ── INICIALIZAÇÃO ──────────────────────────────────────────────────────────
(function init() {
  user = loadUser();
  renderBanners();
  renderChips();
  const fd = document.getElementById('fData');
  fd.value = today();
  fd.min = today();
  fd.addEventListener('change', () => { document.getElementById('fHorario').value = ''; buildTimeGrid(); });
  if (user) { vendSel = user.nome; renderChips(); }
  if (!user) setTimeout(openModal, 350);
})();
</script>
</body>
</html>
